<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>La Machine à Café de Claude de France</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <img src="media/logo.png" alt="logo" id="logo">
            <h1>La Machine à café de Claude de France</h1>
            <h2>Remplisser le formulaire ci-dessous et cliquez sur Commander</h2>
        </header>

        <form class="bordure">

            <b>Choisissez votre café : </b>
            <br /><select name="select_box_kfe" class="bordure-menu-text">
                <option>Mélange maison</option>
                <option>Bolivie</option>
                <option>Guatemala</option>
                <option>Kenya</option>
            </select><br />

            <b>Type :<br /></b>
            <input type="radio" id="kfe_grains" name="type_kfe" value="kfe_grains">
            <label for="kfe_grains">Café en grains</label><br />
            <input type="radio" id="kfe_moulu" name="type_kfe" value="kfe_moulu">
            <label for="kfe_moulu">Café moulu</label><br /><br />
            <b>Options :</b><br />
            <input type="checkbox" id="paquet_kdo" name="paquet_kdo" value="paquet_kdo">
            <label for="paquet_kdo">Paquet cadeaux</label><br />
            <input type="checkbox" id="catalogue" name="catalogue" value="catalogue">
            <label for="catalogue">Joindre un catalogue</label><br /><br />
            

            <div class="bordure">
            <b>Coordonnées client : <br /></b>
            <label for="nom">Nom : </label>
            <input type="text" id="nom" name="nom" class="bordure-menu-text" placeholder="Dupons"><br />
            <label for="adresse">Adresse : </label>
            <input type="text" id="adresse" name="adresse" class="bordure-menu-text" placeholder="1 rue de la paix"><br />
            <label for="ville" id="align-ville">Ville : </label>
            <input type="text" id="ville" name="ville" class="bordure-menu-text" placeholder="Paris"><br />
            <label for="code_postal">Code postal : </label>
            <input type="text" id="code_postal" name="code_postal" class="bordure-menu-text" placeholder="75000"><br /><br />
            </div>


            <b><label for="commentaires">Vos commentaires : </label><br /></b>
            <textarea rows="5" class="bordure-menu-text" placeholder="Inserez votre commentaires...."></textarea><br /><br />
            <input type="submit" id="commentaires" class="anime-boutton" name="envoyer">
            <input type="reset" id="commentaires" class="anime-boutton" name="annuler">

        </form>

        <footer>
            <p>
                © Tous droits réservés
            </p>
        </footer>
    </body>
</html>
